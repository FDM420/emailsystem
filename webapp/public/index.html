<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email System — Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login" class="login-wrap hidden">
    <form id="loginForm" class="login-card">
      <h1>📧 Email System</h1>
      <p class="muted">Admin portal</p>
      <input type="password" id="password" placeholder="Admin password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <div id="loginError" class="error"></div>
    </form>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <div class="brand">📧 Email System</div>
      <div class="actions">
        <button id="addBtn" class="primary">+ Add Client</button>
        <button id="refreshBtn" class="ghost">↻ Refresh</button>
        <button id="logoutBtn" class="ghost">Sign out</button>
      </div>
    </header>

    <main>
      <section id="domainsSection">
        <h2>Domains <span id="domainCount" class="badge"></span></h2>
        <div id="domains" class="grid"></div>
        <div id="domainsEmpty" class="muted hidden">No domains yet. Click “Add Client” to provision the first one.</div>
      </section>

      <section id="detailSection" class="hidden">
        <button class="ghost back" id="backBtn">← Back to all domains</button>
        <h2 id="detailDomain"></h2>
        <div class="cols">
          <div class="col">
            <h3>Mailboxes</h3>
            <div id="mailboxes"></div>
          </div>
          <div class="col">
            <h3>DNS records to paste</h3>
            <p class="muted small">Add these at the client's DNS host (Hostinger, GoDaddy, etc.).</p>
            <div id="dns"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ADD CLIENT MODAL -->
  <div id="modal" class="modal-wrap hidden">
    <div class="modal">
      <h2>Add Client</h2>
      <form id="provisionForm">
        <label>Domain
          <input type="text" id="domain" placeholder="clientdomain.com" required />
        </label>
        <label>Mailboxes <span class="muted small">(comma separated, just the part before @)</span>
          <input type="text" id="mailboxesInput" placeholder="info, sales, contact" />
        </label>
        <label>Mailbox size (MB)
          <input type="number" id="quota" value="1024" min="100" step="100" />
        </label>
        <div class="modal-actions">
          <button type="button" class="ghost" id="cancelBtn">Cancel</button>
          <button type="submit" class="primary" id="provisionBtn">Provision</button>
        </div>
      </form>
      <div id="provisionResult"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
